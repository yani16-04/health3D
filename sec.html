<!-- Contact Form Section -->
<section class="contact-section" id="contact">
    <div class="contact-container fade-up">
        <div class="section-tag">/ Contact Us</div>
        <h2 class="section-title">
            Start Your <em>Assessment</em>
        </h2>
        <p class="section-body">
            Take the first step toward optimized health. Fill out the form below, and our team will contact you shortly.
        </p>

        <form action="https://formsubmit.co/yaniprajapati@gmail.com" method="POST" class="contact-form">
            <!-- FormSubmit Settings -->
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="New Vitalis Assessment Request">
            <input type="hidden" name="_template" value="table">

            <input type="text" name="name" placeholder="Full Name" required>
            <input type="email" name="email" placeholder="Email Address" required>
            <input type="tel" name="phone" placeholder="Phone Number" required>

            <textarea
                name="message"
                rows="6"
                placeholder="Tell us about your wellness goals..."
                required></textarea>

            <button type="submit" class="btn-primary">
                Start Free Assessment →
            </button>
        </form>
    </div>
</section>
